<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup Card Gasto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0914; color: white; padding: 1.5rem; }
        .hbo-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.25rem;
            backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="max-w-md mx-auto space-y-4">
    <div class="mb-8">
        <h1 class="text-xl font-black text-white tracking-tight">Proposta de Novo Card</h1>
        <p class="text-[11px] font-bold uppercase tracking-widest text-slate-500 mt-1">Design Mobile & Desktop Unificado</p>
    </div>

    <!-- Exemplo 1: Fixo / Recorrente -->
    <div class="hbo-card p-4 transition-all hover:bg-white/[0.04]">
        <div class="flex items-center gap-3.5">
            <!-- Icone -->
            <div class="w-12 h-12 rounded-xl shrink-0 flex items-center justify-center bg-blue-500/10 border border-blue-500/20 text-blue-400">
                <i data-lucide="home"></i>
            </div>
            
            <!-- Info principal -->
            <div class="flex-1 min-w-0">
                <div class="flex items-center justify-between">
                    <h4 class="text-sm font-bold text-white truncate">Aluguel do Escritório</h4>
                    <span class="text-base font-black text-white ml-2 shrink-0 leading-none">R$ 1.500,00</span>
                </div>
                
                <!-- Info secundaria -->
                <div class="flex items-center justify-between mt-1">
                    <div class="flex items-center gap-2 text-[9px] font-bold uppercase tracking-widest text-slate-400">
                        <span class="text-blue-400">Moradia</span>
                        <span class="w-1 h-1 rounded-full bg-slate-600"></span>
                        <span>Vence dia 15</span>
                    </div>
                    <span class="text-[8px] font-black uppercase tracking-wider px-1.5 py-0.5 rounded border border-emerald-500/20 bg-emerald-500/10 text-emerald-400">
                        Recorrente
                    </span>
                </div>
            </div>
        </div>
    </div>

    <!-- Exemplo 2: Parcelado -->
    <div class="hbo-card p-4 transition-all hover:bg-white/[0.04]">
        <div class="flex items-start gap-3.5">
            <!-- Icone -->
            <div class="w-12 h-12 rounded-xl shrink-0 flex items-center justify-center bg-purple-500/10 border border-purple-500/20 text-purple-400">
                <i data-lucide="shopping-cart"></i>
            </div>
            
            <!-- Info principal -->
            <div class="flex-1 min-w-0">
                <div class="flex items-center justify-between">
                    <h4 class="text-sm font-bold text-white truncate flex items-center gap-1.5">
                        MacBook Pro
                    </h4>
                    <span class="text-base font-black text-white ml-2 shrink-0 leading-none">R$ 1.250,00</span>
                </div>
                <div class="mt-1">
                    <span class="inline-block px-1.5 py-0.5 rounded bg-purple-500/20 border border-purple-500/30 text-purple-400 text-[8px] font-black uppercase tracking-tighter">
                        Próxima Fatura 10/04
                    </span>
                </div>
                
                <!-- Info secundaria -->
                <div class="flex items-center justify-between mt-2">
                    <div class="flex items-center gap-2 text-[9px] font-bold uppercase tracking-widest text-slate-400">
                        <span class="text-purple-400">Compras</span>
                        <span class="w-1 h-1 rounded-full bg-slate-600"></span>
                        <span>Fatura 10</span>
                    </div>
                    <span class="text-[8px] font-black uppercase tracking-wider px-1.5 py-0.5 rounded border border-purple-500/20 bg-purple-500/10 text-purple-400">
                        3/12 Parcelas
                    </span>
                </div>
                
                <!-- Barra Progresso Parcelas -->
                <div class="mt-3">
                    <div class="flex items-center justify-between text-[9px] font-black uppercase tracking-widest px-1 mb-1">
                        <span class="text-slate-500">Restam <span class="text-white">R$ 11.250,00</span></span>
                        <span class="text-purple-400">25%</span>
                    </div>
                    <div class="h-1 w-full bg-white/5 rounded-full relative overflow-hidden">
                        <div class="absolute inset-y-0 left-0 bg-purple-500 rounded-full w-1/4 shadow-[0_0_12px_rgba(168,85,247,0.4)]"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Exemplo 3: Avulso -->
    <div class="hbo-card p-4 transition-all hover:bg-white/[0.04]">
        <div class="flex items-center gap-3.5">
            <!-- Icone -->
            <div class="w-12 h-12 rounded-xl shrink-0 flex items-center justify-center bg-rose-500/10 border border-rose-500/20 text-rose-400">
                <i data-lucide="coffee"></i>
            </div>
            
            <!-- Info principal -->
            <div class="flex-1 min-w-0">
                <div class="flex items-center justify-between">
                    <h4 class="text-sm font-bold text-white truncate">Almoço Equipe</h4>
                    <span class="text-base font-black text-white ml-2 shrink-0 leading-none">R$ 185,50</span>
                </div>
                
                <!-- Info secundaria -->
                <div class="flex items-center justify-between mt-1">
                    <div class="flex items-center gap-2 text-[9px] font-bold uppercase tracking-widest text-slate-400">
                        <span class="text-rose-400">Alimentação</span>
                        <span class="w-1 h-1 rounded-full bg-slate-600"></span>
                        <span>Realizado hoje</span>
                    </div>
                    <span class="text-[8px] font-black uppercase tracking-wider px-1.5 py-0.5 rounded border border-amber-500/20 bg-amber-500/10 text-amber-400">
                        Avulso
                    </span>
                </div>
            </div>
        </div>
    </div>

    <script>
      lucide.createIcons();
    </script>
</body>
</html>
